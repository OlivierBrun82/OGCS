
services:
###> doctrine/doctrine-bundle ###
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    depends_on:
      - database
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      APP_ENV: dev
      DATABASE_URL: "mysql://app:root@database:3306/ogcs?serverVersion=8.0&charset=utf8"
    command: php -S 0.0.0.0:8000 -t public
    ports:
      # hôte:conteneur — le serveur intégré écoute sur 8000 dans l’image
      - "8005:8000"
  database:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ogcs}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    depends_on:
      - database
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    # Port hôte configurable (évite les conflits avec 8080). Ex. dans .env : PHPMYADMIN_PORT=8090
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
###< doctrine/doctrine-bundle ###

volumes:
###> doctrine/doctrine-bundle ###
  mysql_data:
###< doctrine/doctrine-bundle ###
